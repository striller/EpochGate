name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o epochgate-linux-amd64 ./cmd/server
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o epochgate-linux-arm64 ./cmd/server

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            epochgate-linux-amd64
            epochgate-linux-arm64

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: satriller/epochgate
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest
          annotations: |
            org.opencontainers.image.description=Reverse proxy gatekeeper for npm - blocks young packages to prevent supply-chain attacks
            org.opencontainers.image.title=EpochGate

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Docker Hub description
        run: |
          cat > /tmp/dockerhub.md << 'EOF'
          # EpochGate

          A reverse proxy gatekeeper for Nexus npm repositories that enforces a minimum package age policy. Packages younger than a configurable threshold are blocked, preventing supply-chain attacks via freshly published malicious packages.

          ## Quick Start

          ```bash
          docker run -d \
            -p 8080:8080 \
            -e NEXUS_URL=http://nexus:8081/repository/npm-proxy/ \
            -e MIN_AGE_DAYS=7 \
            satriller/epochgate
          ```

          ## Configuration

          | Variable | Default | Description |
          |----------|---------|-------------|
          | `LISTEN_PORT` | `:8080` | Address and port to listen on |
          | `NEXUS_URL` | `http://localhost:8081/repository/npm-proxy/` | Nexus npm proxy repository URL |
          | `NPM_REGISTRY` | `https://registry.npmjs.org/` | Upstream npm registry for metadata |
          | `MIN_AGE_DAYS` | `7` | Minimum package age in days before allowing |

          ## How It Works

          ```
          npm client → EpochGate → Nexus Registry → Upstream npm
                            ↓
                    Checks package age
                    via registry.npmjs.org
          ```

          1. Client requests a package through EpochGate
          2. EpochGate checks the package's last modified timestamp from the npm registry
          3. If the package is younger than `MIN_AGE_DAYS`, the request is blocked with `403 Forbidden`
          4. If the package passes, it is proxied to your Nexus repository
          5. Results are cached in-memory for fast repeated requests

          ## Links

          - [GitHub Repository](https://github.com/striller/EpochGate)
          - [Configuration Guide](https://github.com/striller/EpochGate/blob/main/README.md)
          EOF
          README_JSON=$(cat /tmp/dockerhub.md | jq -Rs .)
          TOKEN=$(curl -s https://hub.docker.com/v2/auth/token \
            -H 'Content-Type: application/json' \
            -d "{\"identifier\":\"${{ secrets.DOCKER_USERNAME }}\",\"secret\":\"${{ secrets.DOCKER_PASSWORD }}\"}" \
            | jq -r '.access_token')
          curl -s -X PATCH \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/epochgate/" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"description\": \"Reverse proxy gatekeeper for npm - blocks young packages to prevent supply-chain attacks\", \"full_description\": $README_JSON}" \
            | jq -r '.description // .message'
